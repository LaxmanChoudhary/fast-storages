name: PR Title Check

# Validates that PR titles follow Conventional Commits so the
# bump-version-and-tag workflow can reliably parse them on merge.
# https://www.conventionalcommits.org/

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read
  statuses: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types. Maps to version bumps in bump-version-and-tag.yml:
          #   feat              -> minor
          #   fix, perf         -> patch
          #   BREAKING CHANGE / "!" after type (e.g. "feat!:") -> major
          #   docs, style, refactor, test, build, ci, chore, revert -> patch (no functional change, still ships)
          types: |
            feat
            fix
            perf
            docs
            style
            refactor
            test
            build
            ci
            chore
            revert
          # Require lowercase, non-empty description after the colon
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: >
            The PR title's subject (after the "type:") must not start with
            an uppercase letter, e.g. "feat: add new parser" not "feat: Add new parser".
          # Allow an optional scope, e.g. "feat(parser): ..."
          requireScope: false
          # Comment on the PR explaining the convention if validation fails
          wip: true
          validateSingleCommit: false